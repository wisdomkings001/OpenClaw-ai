// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(n){
  const v=parseFloat(n);
  if(!v||isNaN(v)) return '—';
  if(v>=10000) return v.toLocaleString('en-US',{maximumFractionDigits:2});
  if(v>=1) return v.toFixed(2);
  if(v>=0.01) return v.toFixed(4);
  if(v>=0.0001) return v.toFixed(6);
  return v.toFixed(8);
}
function fmtVol(v){
  const n=parseFloat(v);
  if(!n||isNaN(n)) return '—';
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(2);
}

// ─── WEBSOCKET ────────────────────────────────────────────────────────────────
const symbolSet = new Set(COINS.map(c=>c.s));
function connectWS(){
  let ws;
  try {
    ws = new WebSocket('wss://stream.binance.com:9443/ws/!miniTicker@arr');
    ws.onopen = ()=>{ wsStatus='live'; render(); };
    ws.onmessage = e=>{
      try {
        const arr=JSON.parse(e.data);
        if(!Array.isArray(arr)) return;
        const newFlash={};
        arr.forEach(t=>{
          if(!symbolSet.has(t.s)) return;
          const np=parseFloat(t.c), op=prevP[t.s]?parseFloat(prevP[t.s].lastPrice):0;
          if(op && np!==op) newFlash[t.s]=np>op?'up':'down';
          prices[t.s]={lastPrice:t.c,priceChangePercent:t.P,highPrice:t.h,lowPrice:t.l,quoteVolume:t.q,openPrice:t.o,priceChange:t.p};
          prevP[t.s]=prices[t.s];
        });
        flash=newFlash;
        render();
        setTimeout(()=>{flash={};render();},700);
      } catch(e){}
    };
    ws.onerror=()=>{wsStatus='error';render();};
    ws.onclose=()=>{wsStatus='Reconnecting...';render();setTimeout(connectWS,3000);};
  } catch(e){wsStatus='error';render();setTimeout(connectWS,5000);}
}
connectWS();

// ─── ORDER BOOK ───────────────────────────────────────────────────────────────
let book = {bids:[],asks:[]};
let bookIv = null;
function loadBook(sym){
  clearInterval(bookIv);
  const load=async()=>{
    try{
      const r=await fetch(`https://api.binance.com/api/v3/depth?symbol=${sym}&limit=12`);
      const d=await r.json();
      book={bids:d.bids||[],asks:d.asks||[]};
      if(selected && selected.s===sym) renderDetail();
    }catch(e){}
  };
  load();
  bookIv=setInterval(load,1500);
}

// ─── TRADINGVIEW CHART INJECT ─────────────────────────────────────────────────
function injectChart(sym){
  const el=document.getElementById('tv-chart');
  if(!el) return;
  el.innerHTML='';
  const wrap=document.createElement('div');
  wrap.style.cssText='width:100%;height:100%';
  const inner=document.createElement('div');
  inner.className='tradingview-widget-container__widget';
  inner.style.cssText='width:100%;height:100%';
  wrap.appendChild(inner);
  const sc=document.createElement('script');
  sc.type='text/javascript';
  sc.src='https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  sc.async=true;
  sc.textContent=JSON.stringify({
    autosize:true,symbol:`BINANCE:${sym}`,interval:'60',
    timezone:'Etc/UTC',theme:'dark',style:'1',locale:'en',
    backgroundColor:'rgba(8,8,8,1)',gridColor:'rgba(255,255,255,0.03)',
    allow_symbol_change:false,hide_top_toolbar:false,
    hide_legend:false,save_image:false,hide_volume:false,
    support_host:'https://www.tradingview.com'
  });
  wrap.appendChild(sc);
  el.appendChild(wrap);
}

// ─── BADGE HTML ───────────────────────────────────────────────────────────────
function badgeHTML(coin, size=38){
  const fs=Math.max(8,size*.27);
  return `<div class="badge" style="width:${size}px;height:${size}px;background:${coin.c}18;border:2px solid ${coin.c}45;font-size:${fs}px;color:${coin.c}">${coin.t.slice(0,4)}</div>`;
}

// ─── SORTED COINS ─────────────────────────────────────────────────────────────
function getSorted(){
  return COINS
    .map(c=>({...c,...(prices[c.s]||{})}))
    .filter(c=>!search||c.n.toLowerCase().includes(search.toLowerCase())||c.t.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      if(sort==='volume') return (parseFloat(b.quoteVolume)||0)-(parseFloat(a.quoteVolume)||0);
      if(sort==='gainers') return (parseFloat(b.priceChangePercent)||0)-(parseFloat(a.priceChangePercent)||0);
      if(sort==='losers') return (parseFloat(a.priceChangePercent)||0)-(parseFloat(b.priceChangePercent)||0);
      if(sort==='price') return (parseFloat(b.lastPrice)||0)-(parseFloat(a.lastPrice)||0);
      return 0;
    });
}

          <img src="${PROFILE}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentNode.innerHTML='W';this.parentNode.style.cssText+='background:linear-gradient(135deg,#F3BA2F,#ff8c00);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#000'"/>
        </div>
        <span style="font-size:9px;color:#444"><span style="color:#F3BA2F">TechCraft</span> &amp; Coding By <span style="color:#F3BA2F">Wisdom</span></span>
        <a href="https://www.instagram.com/kingswisdom935?igsh=NGlhNjh2eW8wdDVt" target="_blank" style="font-size:9px;color:#F3BA2F;padding:1px 7px;border-radius:10px;border:1px solid rgba(243,186,47,.2);text-decoration:none">Contact</a>
      </div>
    </div>
  </div>`;
}

// ─── RENDER LIST ──────────────────────────────────────────────────────────────
function listHTML(){
  const coins=getSorted();
  const sorts=[['volume','🔥 Volume'],['gainers','📈 Gainers'],['losers','📉 Losers'],['price','💲 Price']];
  const sortBtns=sorts.map(([k,l])=>`<button class="btn-sort${sort===k?' active':''}" onclick="setSort('${k}')">${l}</button>`).join('');

  const rows=coins.map((coin,i)=>{
    const chg=parseFloat(coin.priceChangePercent)||0;
    const pos=chg>=0;
    const fd=flash[coin.s];
    const fc=fd==='up'?'fg':fd==='down'?'fr':'';
    return `<div class="row ${fc}" onclick="selectCoin('${coin.s}')" style="animation:fadeUp .25s ease ${i*.007}s both">
      <div style="display:flex;align-items:center;gap:10px">
        ${badgeHTML(coin,36)}
        <div>
          <div style="color:#e0e0e0;font-size:13px;font-weight:700">${coin.t}</div>
          <div style="color:#2a2a2a;font-size:9.5px;margin-top:1px">${coin.n}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center">
        <span class="mono" style="color:${coin.lastPrice?'#f0f0f0':'#2a2a2a'};font-size:13px;font-weight:700">${coin.lastPrice?'$'+fmt(coin.lastPrice):'...'}</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:flex-end">
        <span class="pill" style="color:${pos?'#2ed573':'#ff4757'};background:${pos?'rgba(46,213,115,.08)':'rgba(255,71,87,.08)';font-size:11.5px}">${pos?'+':''}${chg.toFixed(2)}%</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:flex-end">
        <span class="mono" style="color:#2ed573;font-size:11.5px">${coin.highPrice?'$'+fmt(coin.highPrice):'—'}</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:flex-end">
        <span class="mono" style="color:#ff4757;font-size:11.5px">${coin.lowPrice?'$'+fmt(coin.lowPrice):'—'}</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:flex-end">
        <span class="mono" style="color:#555;font-size:11px">${coin.quoteVolume?'$'+fmtVol(coin.quoteVolume):'—'}</span>
      </div>
    </div>`;
  }).join('');

  return `
  <div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
    <div style="padding:10px 14px 8px;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0;display:flex;gap:10px;align-items:center">
      <div style="flex:1;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:7px 12px;max-width:300px">
        <span style="color:#333;font-size:13px">🔍</span>
        <input id="srch" value="${search}" oninput="setSearch(this.value)" placeholder="Search coin name or symbol..." style="flex:1;background:none;border:none;color:#ccc;font-size:12px"/>
        ${search?`<button onclick="setSearch('')" style="background:none;color:#444;font-size:13px">✕</button>`:''}
      </div>
      <div style="display:flex;gap:5px">${sortBtns}</div>
      <div style="margin-left:auto;color:#2a2a2a;font-size:10px">${coins.length} coins</div>
    </div>
    <div class="hdr">
      <span style="color:#1e1e1e;font-size:9px;letter-spacing:1px">COIN</span>
      <span style="color:#1e1e1e;font-size:9px;letter-spacing:1px">PRICE</span>
      <span style="color:#1e1e1e;font-size:9px;letter-spacing:1px;text-align:right">24H CHANGE</span>
      <span style="color:#1e1e1e;font-size:9px;letter-spacing:1px;text-align:right">24H HIGH</span>
      <span style="color:#1e1e1e;font-size:9px;letter-spacing:1px;text-align:right">24H LOW</span>
      <span style="color:#1e1e1e;font-size:9px;letter-spacing:1px;text-align:right">VOLUME</span>
    </div>
    <div style="flex:1;overflow-y:auto">${rows}${coins.length===0?`<div style="text-align:center;padding:60px;color:#2a2a2a"><div style="font-size:36px;margin-bottom:10px">🔍</div>No coins match "${search}"</div>`:''}</div>
  </div>`;
}

// ─── RENDER DETAIL ────────────────────────────────────────────────────────────
function renderDetail(){
  const coin=selected;
  const p=prices[coin.s]||{};
  const chg=parseFloat(p.priceChangePercent)||0;
  const pos=chg>=0;

  // Order book HTML
  const allVols=[...book.bids,...book.asks].map(r=>parseFloat(r[1]));
  const maxV=Math.max(...allVols,0.001);
  const askRows=[...book.asks].reverse().slice(0,8).map(r=>{
    const pct=(parseFloat(r[1])/maxV)*100;
    return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;padding:3px 8px;position:relative;overflow:hidden;font-size:10.5px">
      <div style="position:absolute;right:0;top:0;bottom:0;width:${pct}%;background:rgba(255,71,87,.06)"></div>
      <span class="mono" style="color:#ff4757;font-weight:600;position:relative">${fmt(r[0])}</span>
      <span class="mono" style="text-align:center;color:#666;position:relative">${parseFloat(r[1]).toFixed(4)}</span>
      <span class="mono" style="text-align:right;color:#3a3a3a;position:relative">${fmtVol(parseFloat(r[0])*parseFloat(r[1]))}</span>
    </div>`;
  }).join('');
  const bidRows=book.bids.slice(0,8).map(r=>{
    const pct=(parseFloat(r[1])/maxV)*100;
    return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;padding:3px 8px;position:relative;overflow:hidden;font-size:10.5px">
      <div style="position:absolute;right:0;top:0;bottom:0;width:${pct}%;background:rgba(46,213,115,.06)"></div>
      <span class="mono" style="color:#2ed573;font-weight:600;position:relative">${fmt(r[0])}</span>
      <span class="mono" style="text-align:center;color:#666;position:relative">${parseFloat(r[1]).toFixed(4)}</span>
      <span class="mono" style="text-align:right;color:#3a3a3a;position:relative">${fmtVol(parseFloat(r[0])*parseFloat(r[1]))}</span>
    </div>`;
  }).join('');

  const detailEl=document.getElementById('detail-view');
  if(!detailEl) return;
  detailEl.innerHTML=`
    <div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
      <div style="padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.5)">
        <div style="display:flex;align-items:center;gap:10px">
          ${badgeHTML(coin,40)}
          <div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="color:#f0f0f0;font-size:16px;font-weight:900;font-family:'Bebas Neue',sans-serif;letter-spacing:1.2px">${coin.t}/USDT</span>
              <span class="pill" style="color:${pos?'#2ed573':'#ff4757'};background:${pos?'rgba(46,213,115,.1)':'rgba(255,71,87,.1)'};font-size:11px">${pos?'▲':'▼'} ${Math.abs(chg).toFixed(2)}%</span>
            </div>
            <div style="color:#F3BA2F;font-size:24px;font-weight:900;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;line-height:1.1">${p.lastPrice?'$'+fmt(p.lastPrice):'Loading...'}</div>
          </div>
        </div>
        <div style="display:flex;gap:18px;align-items:center">
          <div style="text-align:center"><div style="color:#2a2a2a;font-size:8.5px;letter-spacing:.8px;margin-bottom:2px">24H HIGH</div><div style="color:#2ed573;font-weight:700;font-size:12px">$${fmt(p.highPrice)}</div></div>
          <div style="text-align:center"><div style="color:#2a2a2a;font-size:8.5px;letter-spacing:.8px;margin-bottom:2px">24H LOW</div><div style="color:#ff4757;font-weight:700;font-size:12px">$${fmt(p.lowPrice)}</div></div>
          <div style="text-align:center"><div style="color:#2a2a2a;font-size:8.5px;letter-spacing:.8px;margin-bottom:2px">VOLUME</div><div style="color:#888;font-weight:700;font-size:12px">$${fmtVol(p.quoteVolume)}</div></div>
          <div style="text-align:center"><div style="color:#2a2a2a;font-size:8.5px;letter-spacing:.8px;margin-bottom:2px">OPEN</div><div style="color:#ccc;font-weight:700;font-size:12px">$${fmt(p.openPrice)}</div></div>
          <button onclick="closeCoin()" style="background:rgba(255,255,255,.05);color:#777;font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.07)">✕ Back</button>
        </div>
      </div>
      <div style="flex:1;display:flex;overflow:hidden">
        <div style="flex:1;overflow:hidden" id="tv-chart"></div>
        <div style="width:235px;border-left:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;overflow:hidden">
          <div style="padding:8px 8px 4px;flex-shrink:0">
            <div style="color:#2a2a2a;font-size:8.5px;letter-spacing:1.2px;margin-bottom:5px">ORDER BOOK</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;padding:0 8px;margin-bottom:3px">
              <span style="color:#1e1e1e;font-size:8.5px">Price</span>
              <span style="text-align:center;color:#1e1e1e;font-size:8.5px">Amount</span>
              <span style="text-align:right;color:#1e1e1e;font-size:8.5px">Total</span>
            </div>
          </div>
          <div style="flex:1;overflow-y:auto">
            ${askRows}
            <div style="text-align:center;padding:6px 0;margin:2px 0;background:rgba(243,186,47,.05);border-top:1px solid rgba(243,186,47,.08);border-bottom:1px solid rgba(243,186,47,.08)">
              <span style="color:#F3BA2F;font-weight:900;font-size:14px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px">$${fmt(p.lastPrice)}</span>
              <span style="color:#333;font-size:8.5px;margin-left:5px">LAST</span>
            </div>
            ${bidRows}
          </div>
        </div>
      </div>
    </div>`;

  setTimeout(()=>injectChart(coin.s), 100);
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(!app) return;

  if(selected){
    app.innerHTML=`
      <div style="height:100vh;display:flex;flex-direction:column;overflow:hidden">
        ${headerHTML()}
        <div id="detail-view" style="flex:1;overflow:hidden"></div>
      </div>`;
    renderDetail();
  } else {
    app.innerHTML=`
      <div style="height:100vh;display:flex;flex-direction:column;overflow:hidden">
        ${headerHTML()}
        <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">
          ${listHTML()}
        </div>
      </div>`;
    // Re-focus search if was typing
    const s=document.getElementById('srch');
    if(s && search){ s.focus(); s.setSelectionRange(s.value.length,s.value.length); }
  }
}

// ─── GLOBAL ACTIONS ───────────────────────────────────────────────────────────
window.selectCoin=function(sym){
  selected=COINS.find(c=>c.s===sym);
  loadBook(sym);
  render();
};
window.closeCoin=function(){
  selected=null;
  clearInterval(bookIv);
  book={bids:[],asks:[]};
  render();
};
window.setSort=function(s){sort=s;render();};
window.setSearch=function(v){search=v;render();};

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
